<div class="durp" (click)="$event.stopPropagation()">

  <!-- ── Trigger ──────────────────────────────────────────── -->
  <div class="durp__trigger-row">
    <button
      type="button"
      class="durp__trigger"
      [class.durp__trigger--set]="!!value"
      [class.durp__trigger--open]="open"
      (click)="toggle()"
      [title]="value ? displayLabel : placeholder"
    >
      <i class="material-icons">timer</i>
      <span class="durp__trigger-label">{{ value ? displayLabel : placeholder }}</span>
      <i class="material-icons durp__trigger-arrow">{{ open ? 'expand_less' : 'expand_more' }}</i>
    </button>

    @if (value) {
      <button type="button" class="durp__clear-btn" (click)="clear()" title="Clear duration">
        <i class="material-icons">close</i>
      </button>
    }
  </div>

  <!-- ── Popover ──────────────────────────────────────────── -->
  @if (open) {
    <div class="durp__popover">

      <!-- Quick picks -->
      <div class="durp__quick-grid">
        @for (mins of QUICK_PICKS; track mins) {
          <button
            type="button"
            class="durp__quick-chip"
            [class.durp__quick-chip--active]="isQuickActive(mins)"
            (click)="pickQuick(mins)"
          >{{ quickLabel(mins) }}</button>
        }
      </div>

      <!-- Divider -->
      <div class="durp__divider"></div>

      <!-- Custom hours / minutes fields -->
      <div class="durp__custom-label">Custom estimate</div>
      <div class="durp__fields">
        <div class="durp__field">
          <div class="durp__field-box">
            <input
              class="durp__field-input"
              type="text" inputmode="numeric" maxlength="3" aria-label="Hours"
              [value]="hourStr"
              (focus)="selectInputText($event)"
              (change)="onHoursInput($event)"
              (keydown.enter)="$any($event.target).blur()"
            >
            <div class="durp__steppers">
              <button type="button" (click)="adjHours(1)" aria-label="Increase hours">
                <i class="material-icons">keyboard_arrow_up</i>
              </button>
              <button type="button" (click)="adjHours(-1)" aria-label="Decrease hours">
                <i class="material-icons">keyboard_arrow_down</i>
              </button>
            </div>
          </div>
          <span class="durp__field-lbl">Hours</span>
        </div>

        <div class="durp__field">
          <div class="durp__field-box">
            <input
              class="durp__field-input"
              type="text" inputmode="numeric" maxlength="2" aria-label="Minutes"
              [value]="minStr"
              (focus)="selectInputText($event)"
              (change)="onMinutesInput($event)"
              (keydown.enter)="$any($event.target).blur()"
            >
            <div class="durp__steppers">
              <button type="button" (click)="adjMinutes(1)" aria-label="Increase minutes">
                <i class="material-icons">keyboard_arrow_up</i>
              </button>
              <button type="button" (click)="adjMinutes(-1)" aria-label="Decrease minutes">
                <i class="material-icons">keyboard_arrow_down</i>
              </button>
            </div>
          </div>
          <span class="durp__field-lbl">Minutes</span>
        </div>
      </div>

      <!-- Live total preview -->
      <div class="durp__preview">
        Total: <span>{{ customPreview }}</span>
      </div>

      <!-- Footer -->
      <div class="durp__footer">
        <button type="button" class="durp__btn-clear" (click)="clear()">Clear</button>
        <button type="button" class="durp__btn-confirm" (click)="confirmCustom()">
          <i class="material-icons">check</i>
          Confirm
        </button>
      </div>

    </div>
  }

</div>

<footer class="modern-footer">
  <div class="footer-inner">

    <!-- TOP ROW: brand | nav links row | social icons -->
    <div class="footer-top">

      <!-- Brand -->
      <a href="#home" class="footer-brand" (click)="scrollToSection($event, '#home')">
        <div class="footer-logo">
          <span class="logo-r">R</span><span class="logo-n">N</span>
        </div>
        <span class="footer-brand-name">
          Rohit<span class="brand-dot">.</span>dev
        </span>
      </a>

      <!-- Nav links inline -->
      <nav class="footer-nav">
        @for (item of menuItems; track item) {
          @if (!item.isHide && item.href) {
            <a [href]="item.href" class="footer-nav-link"
               (click)="scrollToSection($event, item.href!)">{{ item.label }}</a>
          }
        }
      </nav>

      <!-- Social icons -->
      <div class="footer-socials">
        <a class="footer-social-btn" aria-label="GitHub"
           (click)="openLink($event, profileData()?.github)">
          <i class="fab fa-github"></i>
        </a>
        <a class="footer-social-btn" aria-label="LinkedIn"
           (click)="openLink($event, profileData()?.linkedin)">
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a class="footer-social-btn" aria-label="Email"
           [href]="'mailto:' + profileData()?.email">
          <i class="material-icons" style="font-size:1.1rem">mail_outline</i>
        </a>
      </div>

    </div>

    <!-- BOTTOM BAR: copyright + admin pill | resume CTA -->
    <div class="footer-bottom">
      <div class="footer-copy-row">
        <span class="footer-copyright">
          © {{ currentYear }} {{ profileData()?.full_name || 'Rohit Nair' }}. Built with ♥ on Angular 19.
        </span>
        <a routerLink="/auth/login" class="footer-admin-pill">
          Admin <i class="material-icons">lock</i>
        </a>
      </div>
      <a [href]="profileData()?.resume_url || 'assets/Rohit.Nair.pdf'"
         target="_blank" rel="noopener" class="footer-resume-btn">
        <i class="material-icons">download</i>
        Download Resume
      </a>
    </div>

  </div>
</footer>
